<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Murodjon Mirfayzullaev</title>
    <meta name="description" content="Portfolio of Murodjon Mirfayzullaev — graphic and UX/UI designer." />
    <link rel="icon" href="assets/img/profile-placeholder.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      // apply saved theme before paint (default dark) to avoid a flash
      try { document.documentElement.dataset.theme = localStorage.getItem("site.theme") || "dark"; }
      catch (e) { document.documentElement.dataset.theme = "dark"; }
    </script>
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body data-page="index.html" data-title-key="">
    <aside class="sidebar" id="site-sidebar"></aside>
    <div class="scrim" id="scrim" aria-hidden="true"></div>

    <div class="page">
      <header class="topbar" id="site-topbar"></header>

      <main class="site-main" id="main">
        <section class="container home">
          <!-- profile widget -->
          <section class="widget widget--profile" data-reveal>
            <div class="profile">
              <div class="profile__photo">
                <img data-content="photo" alt="" />
              </div>
              <div class="profile__intro">
                <p class="profile__headline" data-i18n="home.headline"></p>
                <h1 class="profile__name" data-content="name"></h1>
                <p class="profile__bio" data-i18n="home.bio"></p>
              </div>
            </div>
          </section>

          <!-- job experience widget (active roles only) -->
          <section class="widget" data-reveal data-reveal-delay="1">
            <div class="widget__head">
              <h2 class="widget__title" data-i18n="experience.title"></h2>
            </div>
            <div class="home-xp" id="home-experience"></div>
            <div class="widget__foot">
              <a class="btn btn--secondary" href="experience.html">
                <span data-i18n="home.seeExperience"></span>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="m9 6 6 6-6 6" />
                </svg>
              </a>
            </div>
          </section>
        </section>
      </main>

      <footer class="site-footer" id="site-footer"></footer>
    </div>

    <script src="assets/js/main.js"></script>
    <script src="assets/js/home.js"></script>
  </body>
</html>

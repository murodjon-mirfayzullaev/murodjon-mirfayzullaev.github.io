<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Murodjon Mirfayzullaev</title>
    <meta name="description" content="Portfolio of Murodjon Mirfayzullaev — graphic and UX/UI designer." />
    <link rel="icon" href="assets/img/profile-placeholder.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body data-page="index.html" data-title-key="">
    <div class="glow" id="glow" aria-hidden="true"></div>

    <aside class="sidebar" id="site-sidebar"></aside>
    <div class="scrim" id="scrim" aria-hidden="true"></div>

    <div class="page">
      <header class="topbar" id="site-topbar"></header>

      <main class="site-main" id="main">
        <section class="container hero">
          <div class="hero__intro">
            <p class="hero__headline" data-reveal data-i18n="home.headline"></p>
            <h1 class="hero__name" data-reveal data-reveal-delay="1" data-content="name"></h1>
            <p class="hero__bio" data-reveal data-reveal-delay="2" data-i18n="home.bio"></p>
            <div class="hero__cta" data-reveal data-reveal-delay="3">
              <a class="btn btn--primary" href="projects.html" data-i18n="home.cta.work"></a>
              <a class="btn btn--ghost" href="contact.html" data-i18n="home.cta.contact"></a>
            </div>
          </div>
          <div class="hero__photo" data-reveal>
            <img data-content="photo" alt="" />
          </div>
        </section>
      </main>

      <footer class="site-footer" id="site-footer"></footer>
    </div>

    <script src="assets/js/main.js"></script>
  </body>
</html>

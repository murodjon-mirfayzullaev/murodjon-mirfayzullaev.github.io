<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact · Murodjon Mirfayzullaev</title>
    <link rel="icon" href="assets/img/profile-placeholder.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      // apply saved theme + sidebar state before paint to avoid a flash/glitch
      try {
        var d = document.documentElement;
        d.dataset.theme = localStorage.getItem("site.theme") || "dark";
        if (localStorage.getItem("site.sidebar") === "collapsed") d.classList.add("sidebar-collapsed");
      } catch (e) { document.documentElement.dataset.theme = "dark"; }
    </script>
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body data-page="contact.html" data-title-key="contact.title">
    <aside class="sidebar" id="site-sidebar"></aside>
    <div class="scrim" id="scrim" aria-hidden="true"></div>

    <div class="page">
      <header class="topbar" id="site-topbar"></header>

      <main class="site-main" id="main">
        <section class="container contact">
          <header class="contact__head">
            <h1 data-reveal data-i18n="contact.title"></h1>
          </header>

          <section class="widget" data-reveal data-reveal-delay="1">
            <div class="widget__head">
              <h2 class="widget__title" data-i18n="contact.linksTitle"></h2>
            </div>
            <div class="links" id="social-links"></div>
          </section>
        </section>
      </main>

      <footer class="site-footer" id="site-footer"></footer>
    </div>

    <script src="assets/js/main.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projects · Murodjon Mirfayzullaev</title>
    <link rel="icon" href="assets/img/profile-placeholder.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      // apply saved theme + sidebar state before paint to avoid a flash/glitch
      try {
        var d = document.documentElement;
        d.dataset.theme = localStorage.getItem("site.theme") || "dark";
        if (localStorage.getItem("site.sidebar") === "collapsed") d.classList.add("sidebar-collapsed");
      } catch (e) { document.documentElement.dataset.theme = "dark"; }
    </script>
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body data-page="projects.html" data-title-key="projects.title">
    <aside class="sidebar" id="site-sidebar"></aside>
    <div class="scrim" id="scrim" aria-hidden="true"></div>

    <div class="page">
      <header class="topbar" id="site-topbar"></header>

      <main class="site-main" id="main">
        <section class="projects">
          <div class="marquee" id="badges-marquee" data-reveal
               aria-label="Tools &amp; technologies">
            <div class="marquee__track" id="badges-track"></div>
          </div>

          <div class="pgrid" id="projects-grid" data-reveal data-reveal-delay="1"></div>
        </section>
      </main>

      <footer class="site-footer" id="site-footer"></footer>
    </div>

    <script src="assets/js/main.js"></script>
    <script src="assets/js/projects.js"></script>
  </body>
</html>
